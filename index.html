      next:"Nästa steg: Läs om rekryteringsprocessen nedan, kolla \"Hur ser BT ut?\" och sedan \"Regioner\" för att hitta tjänster som passar dig." },

        {situations.map(function(s){ return (
          <button key={s.id} onClick={function(){ setSituation(situation === s.id ? null : s.id); }}

              padding:"16px 14px",borderRadius:12,border: situation===s.id ? "2px solid "+s.color : "1.5px solid #E2E8F0",

          </button>
        ); })}

    {/* AT vs BT */}
    <div style={{ background:"#fff",borderRadius:16,border:"1px solid #E2E8F0",padding:"28px",boxShadow:"0 1px 4px rgba(0,0,0,0.04)" }}>
      <h2 style={{ margin:"0 0 16px",fontSize:20,fontWeight:800,color:"#0F172A" }}>⚖️ AT vs BT — vad är skillnaden?</h2>
      <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:16 }}>
        <div style={{ padding:"16px 18px",borderRadius:12,background:"#F8FAFC",border:"1px solid #E2E8F0" }}>
          <div style={{ fontSize:14,fontWeight:800,color:"#64748B",marginBottom:10 }}>AT (Allmäntjänstgöring)</div>
          <div style={{ display:"flex",flexDirection:"column",gap:6,fontSize:13,color:"#475569",lineHeight:1.6 }}>
            <div>• Leder till <strong>läkarlegitimation</strong></div>
            <div>• 18–21 månader</div>
            <div>• Krävs efter 5,5-åriga programmet</div>
            <div>• Fasas ut — sista examen beräknas ~2029</div>
            <div>• Minimitid ST efteråt: 5 år</div>
          </div>
        </div>
        <div style={{ padding:"16px 18px",borderRadius:12,background:"#EFF6FF",border:"1px solid #BFDBFE" }}>
          <div style={{ fontSize:14,fontWeight:800,color:"#1D4ED8",marginBottom:10 }}>BT (Bastjänstgöring)</div>
          <div style={{ display:"flex",flexDirection:"column",gap:6,fontSize:13,color:"#475569",lineHeight:1.6 }}>
            <div>• Görs <strong>efter</strong> legitimation</div>
            <div>• 12 månader (normtid)</div>
            <div>• Krävs efter 6-åriga programmet</div>
            <div>• Obligatorisk del av ST</div>
            <div>• Total tid till specialist: ~5,5 år</div>
          </div>
        </div>
      </div>
      <div style={{ marginTop:16,padding:"12px 16px",borderRadius:10,background:"#FFFBEB",border:"1px solid #FDE68A",fontSize:13,color:"#92400E",lineHeight:1.6 }}>
        💡 <strong>Kort sagt:</strong> AT ger legitimation, BT ger baskompetens. Har du gjort svensk AT behöver du inte göra BT.
      </div>
    </div>

    {/* Ansökningskalender */}
    <div style={{ background:"#fff",borderRadius:16,border:"1px solid #E2E8F0",padding:"28px",boxShadow:"0 1px 4px rgba(0,0,0,0.04)" }}>
      <h2 style={{ margin:"0 0 8px",fontSize:20,fontWeight:800,color:"#0F172A" }}>📅 När ska jag söka? — Ansökningsperioder 2026</h2>
      <p style={{ margin:"0 0 16px",fontSize:14,color:"#64748B",lineHeight:1.7 }}>De viktigaste datumen för fristående BT. Integrerad BT söks direkt hos verksamheten.</p>
      <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
        {[
          { region:"Skåne", period:"20 apr – 3 maj 2026", detail:"Intervjuer 2–4 juni i Lund. Start höst 2026.", urgent:true },
          { region:"Västra Götaland", period:"v.16–18 (april) 2026", detail:"Start september 2026. 40 fristående platser.", urgent:true },
          { region:"Stockholm", period:"Juni–juli 2026", detail:"Via SLSO. Start höst 2026. ~20 platser/omgång.", urgent:false },
          { region:"Uppsala", period:"v.37–39 (sep) 2026", detail:"Nästa ansökningsperiod. 2 ggr/år.", urgent:false },
          { region:"Stockholm", period:"Dec 2026 – jan 2027", detail:"Start vår 2027. Utökning planeras (enl. SLSO).", urgent:false },
          { region:"Örebro", period:"2 ggr/år", detail:"Exakta datum varierar — bevaka regionens lediga jobb.", urgent:false },
          { region:"Dalarna", period:"Löpande", detail:"12–24 platser/år. Bland flest BT per invånare.", urgent:false },
          { region:"Norrbotten", period:"Löpande", detail:"Boende + pendlingsersättning ingår.", urgent:false },
        ].map(function(d,i){ return (
          <div key={i} style={{ display:"flex",gap:14,padding:"12px 16px",borderRadius:10,background: d.urgent ? "#FFF7ED" : "#F8FAFC",border: d.urgent ? "1px solid #FED7AA" : "1px solid #E2E8F0" }}>
            <div style={{ flexShrink:0,width:56,textAlign:"center" }}>
              {d.urgent ? <span style={{ fontSize:10,fontWeight:800,color:"#D97706",background:"#FEF3C7",padding:"2px 6px",borderRadius:4 }}>SNART</span> : <span style={{ fontSize:10,color:"#94A3B8" }}>•</span>}
            </div>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex",gap:8,alignItems:"baseline",flexWrap:"wrap" }}>
                <span style={{ fontSize:14,fontWeight:700,color:"#0F172A" }}>{d.region}</span>
                <span style={{ fontSize:13,fontWeight:600,color: d.urgent ? "#D97706" : "#3B82F6" }}>{d.period}</span>
              </div>
              <div style={{ fontSize:12,color:"#64748B",marginTop:2 }}>{d.detail}</div>
            </div>
          </div>
        ); })}
      </div>
      <div style={{ marginTop:12,fontSize:12,color:"#94A3B8",fontStyle:"italic" }}>Datumen är baserade på regionernas hemsidor och Läkartidningen (2025/2026). Vissa uppgifter har inte kunnat verifieras direkt med regionen. Kontrollera alltid aktuella datum på regionens egen hemsida.</div>
    </div>

    {/* Rekryteringsprocessen */}
    <div style={{ background:"#fff",borderRadius:16,border:"1px solid #E2E8F0",padding:"28px",boxShadow:"0 1px 4px rgba(0,0,0,0.04)" }}>
      <h2 style={{ margin:"0 0 16px",fontSize:20,fontWeight:800,color:"#0F172A" }}>📋 Hur söker man BT?</h2>
      <p style={{ margin:"0 0 16px",fontSize:14,color:"#64748B",lineHeight:1.7 }}>Processen varierar mellan regioner, men det generella flödet:</p>
      <div style={{ display:"flex",flexDirection:"column",gap:2 }}>
        {[
          ["1","Välj BT-typ","Fristående (separat ansökan) eller integrerad (via ST-tjänst). Se fliken \"Hur ser BT ut?\" för detaljer.","#3B82F6"],
          ["2","Hitta tjänster","Regioner annonserar på sin hemsida under \"lediga jobb\". Fristående BT utlyses ofta 2 ggr/år.","#8B5CF6"],
          ["3","Ansök","CV och personligt brev. Vissa regioner har intervjuer (t.ex. Skåne).","#EC4899"],
          ["4","Anställning","Fristående = visstid 12 mån. Integrerad = tillsvidareanställning som ST-läkare.","#F59E0B"],
          ["5","Genomför BT","Klinisk tjänstgöring under handledning. 18 delmål. Fortlöpande bedömning.","#10B981"],
          ["6","Baskompetensbevis","Extern slutbedömning + ansökan till Socialstyrelsen.","#6366F1"],
        ].map(function(s) { return (
          <div key={s[0]} style={{ display:"flex",gap:14,padding:"14px 0",borderBottom:"1px solid #F1F5F9" }}>
            <div style={{ width:32,height:32,borderRadius:"50%",background:s[3],color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,flexShrink:0 }}>{s[0]}</div>
            <div>
              <div style={{ fontSize:14,fontWeight:700,color:"#1A202C" }}>{s[1]}</div>
              <div style={{ fontSize:13,color:"#64748B",marginTop:2,lineHeight:1.6 }}>{s[2]}</div>
            </div>
          </div>
        ); })}
      </div>
    </div>

    {/* AT och BT samlevnad */}
    <div style={{ background:"#fff",borderRadius:16,border:"1px solid #E2E8F0",padding:"28px",boxShadow:"0 1px 4px rgba(0,0,0,0.04)" }}>
      <h2 style={{ margin:"0 0 16px",fontSize:20,fontWeight:800,color:"#0F172A" }}>🔄 AT och BT — hur länge samexisterar de?</h2>
      <p style={{ margin:"0 0 12px",fontSize:15,lineHeight:1.8,color:"#475569" }}>
        De två systemen kommer att finnas parallellt under flera år. Studenter på gamla programmet kan examineras till och med ~2029, och AT bedöms erbjudas till åtminstone ~2030 — men det finns inget nationellt beslut om ett slutdatum. AT-läkare och BT-läkare kommer att arbeta sida vid sida på samma kliniker.
      </p>
      <p style={{ margin:0,fontSize:15,lineHeight:1.8,color:"#475569" }}>
        Övergången sker successivt. Det finns inget slutdatum för AT — först blir BT-läkarna fler och fler, och till slut finns inga nya AT-läkare kvar i systemet.
      </p>
    </div>
  </div>);
}

function BTGuiden() {
  const [tab,setTab]=useState("vadarbt");
  const [search,setSearch]=useState("");
  const [typeFilter,setTypeFilter]=useState("Alla");
  const [show2027Only,setShow2027Only]=useState(false);

  const filtered = useMemo(function(){
    return REGIONS.filter(function(r){
      if (show2027Only && r.slots2027.startsWith("Ej")) return false;
      if (typeFilter!=="Alla") {
        if (!r.btTypes.includes(typeFilter)) return false;
      }
      if (search) { var s=search.toLowerCase(); return r.name.toLowerCase().includes(s)||r.hospitals.some(function(h){return h.toLowerCase().includes(s)}); }
      return true;
    }).sort(function(a,b){ return a.name.localeCompare(b.name,"sv"); });
  },[search,typeFilter,show2027Only]);

  var handleNavigate = function(regionName) {
    setTab("regioner");
    setTimeout(function(){
      var region = REGIONS.find(function(r){ return r.name===regionName; });
      if (region) {
        var el = document.getElementById("region-"+region.id);
        if (el) el.scrollIntoView({ behavior:"smooth", block:"start" });
      }
    }, 100);
  };

  var tabs = [
    { id:"vadarbt", label:"Vad är BT?" },
    { id:"hurserbtut", label:"Hur ser BT ut?" },
    { id:"regioner", label:"Regioner" },
  ];

  return (<div style={{ minHeight:"100vh",background:"#F8FAFC",fontFamily:"'DM Sans',sans-serif" }}>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
    <style>{`*{box-sizing:border-box}select{appearance:auto}`}</style>

    {/* PROTOTYPE BANNER */}
    <div style={{ background:"#FEF3C7",borderBottom:"2px solid #F59E0B",padding:"8px 24px",textAlign:"center" }}>
      <div style={{ fontSize:12,fontWeight:700,color:"#92400E" }}>⚠️ Prototyp — informationen bygger på offentliga källor och uppskattningar. Kontrollera alltid med din region.</div>
      <a href="https://forms.gle/xrczJD86A3PHwipV6" target="_blank" rel="noopener noreferrer" style={{ display:"inline-block",marginTop:4,color:"#92400E",fontSize:11,fontWeight:600,textDecoration:"underline" }}>Ge feedback →</a>
    </div>

    <div style={{ background:"linear-gradient(135deg,#0F172A 0%,#1E293B 50%,#0F172A 100%)",padding:"28px 24px 16px",color:"#fff",position:"relative",overflow:"hidden" }}>
      <div style={{ position:"absolute",top:-80,right:-80,width:300,height:300,background:"radial-gradient(circle,rgba(59,130,246,0.15) 0%,transparent 70%)",borderRadius:"50%" }}/>
      <div style={{ maxWidth:1100,margin:"0 auto",position:"relative" }}>
        <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:4 }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#60A5FA" strokeWidth="1.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          <span style={{ fontSize:11,fontWeight:600,color:"#60A5FA",textTransform:"uppercase",letterSpacing:2 }}>Sverige 2027</span>
        </div>
        <h1 style={{ margin:"0 0 6px",fontSize:32,fontWeight:800,lineHeight:1.1,fontFamily:"'DM Serif Display',serif" }}>BT-guiden</h1>
        <p style={{ margin:"0 0 12px",fontSize:14,color:"#94A3B8",lineHeight:1.5,maxWidth:600 }}>Alla regioners bastjänstgöringar — samlat, jämförbart och uppdaterat.</p>
        <div style={{ display:"flex",gap:20,flexWrap:"wrap",marginBottom:16 }}>
          {[[REGIONS.length+" regioner","📍"],[REGIONS.reduce(function(s,r){return s+r.hospitals.length},0)+" sjukhus/VC","🏥"]].map(function(item){return (<div key={item[0]} style={{ display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#CBD5E1" }}><span style={{fontSize:16}}>{item[1]}</span>{item[0]}</div>)})}
        </div>
        {/* TAB BAR */}
        <div style={{ display:"flex",gap:6,background:"rgba(255,255,255,0.06)",padding:4,borderRadius:12 }}>
          {tabs.map(function(t){ return (
            <button key={t.id} onClick={function(){ setTab(t.id); window.scrollTo({top:0,behavior:"smooth"}); }}
              style={{
                flex:1,padding:"12px 6px",borderRadius:8,
                border: tab===t.id ? "1.5px solid #3B82F6" : "1.5px solid transparent",
                background: tab===t.id ? "#fff" : "transparent",
                color: tab===t.id ? "#1D4ED8" : "rgba(255,255,255,0.5)",
                fontSize:13,fontWeight:700,cursor:"pointer",letterSpacing:0.3,
                boxShadow: tab===t.id ? "0 2px 8px rgba(0,0,0,0.12)" : "none",
                transition:"all 0.15s",
              }}>
              {t.label}
            </button>
          ); })}
        </div>
      </div>
    </div>

    <div style={{ maxWidth:1100,margin:"0 auto",padding:"0 24px" }}>

      {/* TAB: REGIONER */}
      {tab==="regioner" && (<div>
        <div style={{ background:"#fff",borderRadius:16,padding:"20px 24px",boxShadow:"0 4px 20px rgba(0,0,0,0.06)",position:"relative",zIndex:10,border:"1px solid #E2E8F0",display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-end" }}>
          <div style={{ flex:1,minWidth:200,position:"relative" }}>
            <label style={{ fontSize:11,fontWeight:600,color:"#94A3B8",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:5 }}>Sök</label>
            <svg style={{ position:"absolute",left:12,bottom:11,pointerEvents:"none" }} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Region, sjukhus..." value={search} onChange={function(e){setSearch(e.target.value)}} style={{ width:"100%",padding:"10px 14px 10px 36px",borderRadius:10,border:"1.5px solid #E2E8F0",fontSize:14,outline:"none" }}/>
          </div>
          <div style={{ minWidth:160 }}>
            <label style={{ fontSize:11,fontWeight:600,color:"#94A3B8",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:5 }}>Typ</label>
            <select value={typeFilter} onChange={function(e){setTypeFilter(e.target.value)}} style={{ padding:"10px 14px",borderRadius:10,border:"1.5px solid #E2E8F0",background:"#fff",fontSize:14,color:"#1A202C",cursor:"pointer",outline:"none",width:"100%" }}>
              {["Alla","Fristående","Integrerad","Forskar-BT"].map(function(o){return <option key={o}>{o}</option>})}
            </select>
          </div>
          <label style={{ display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,color:"#64748B",fontWeight:600,paddingBottom:6 }}>
            <input type="checkbox" checked={show2027Only} onChange={function(e){setShow2027Only(e.target.checked)}} style={{ width:18,height:18,accentColor:"#D97706",cursor:"pointer" }}/>
            Bara 2027-plan
          </label>
        </div>

        <div style={{ padding:"24px 0 0" }}><InfoBox/></div>

        <div style={{ fontSize:14,color:"#64748B",marginBottom:16 }}>Visar <strong style={{ color:"#1A202C",fontSize:18 }}>{filtered.length}</strong> av {REGIONS.length} regioner</div>

        <div style={{ display:"flex",flexDirection:"column",gap:16 }}>
          {filtered.map(function(r){return (<div key={r.id}><RegionCard r={r} onNavigate={handleNavigate}/></div>)})}
        </div>
      </div>)}

      {/* TAB: VAD ÄR BT? */}
      {tab==="vadarbt" && (<div style={{ padding:"24px 0 0" }}><WhatIsBTSection/></div>)}

      {/* TAB: HUR SER BT UT? */}
      {tab==="hurserbtut" && (<div style={{ padding:"24px 0 0" }}><BTModelsSection/></div>)}

      {/* FEEDBACK + FOOTER (always visible) */}
      <div style={{ textAlign:"center",padding:"32px 20px 16px" }}>
        <a href="https://forms.gle/xrczJD86A3PHwipV6" target="_blank" rel="noopener noreferrer" style={{ display:"inline-block",background:"#3B82F6",color:"#fff",padding:"14px 28px",borderRadius:10,fontSize:15,fontWeight:700,textDecoration:"none",boxShadow:"0 4px 15px rgba(59,130,246,0.3)" }}>
          💬 Ge oss din feedback — det tar bara 1 minut →
        </a>
        <p style={{ margin:"10px 0 0",fontSize:13,color:"#94A3B8" }}>Hjälp oss göra BT-guiden bättre för alla</p>
      </div>

      <div style={{ textAlign:"center",padding:"16px 20px 48px",fontSize:12,color:"#94A3B8",lineHeight:1.8 }}>
        <div style={{ maxWidth:600,margin:"0 auto" }}><strong style={{color:"#64748B"}}>⚠️ Om datan</strong><br/>Informationen är sammanställd från regionernas hemsidor, Läkartidningen, Läkarförbundet (SLF), SYLF och Socialstyrelsens föreskrifter (HSLF-FS 2021:8). Vissa uppgifter — särskilt antal platser, rekryteringsdatum och 2027-planer — har inte kunnat verifieras direkt med varje region och kan vara inaktuella. Siffrorna är uppskattningar och kan förändras. Senast uppdaterad mars 2026. Kontrollera alltid med respektive region. Sidan ersätter inte lokala riktlinjer.</div>
      </div>
    </div>
  </div>);
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<BTGuiden />);
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="padding:40px;color:red"><h2>Renderingsfel</h2><p>' + e.message + '</p></div>';
}
  </script>
</body>
</html>
